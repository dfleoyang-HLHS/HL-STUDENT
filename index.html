<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>學生資料查詢與統計圖表 Student Data Query & Charts</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    h1, h2 {
      margin-bottom: 0.4rem;
    }
    .panel {
      background-color: #fff;
      padding: 15px 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    label {
      margin-right: 8px;
      font-weight: 600;
    }
    select, input[type="text"], button {
      margin-right: 10px;
      margin-bottom: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      background-color: #1976d2;
      color: #fff;
      border: none;
    }
    button:hover {
      background-color: #125a9c;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background-color: #fff;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 6px 8px;
      text-align: center;
      font-size: 14px;
    }
    th {
      background-color: #1976d2;
      color: #fff;
    }
    tbody tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    .chart-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .chart-box {
      flex: 1 1 320px;
      background-color: #fff;
      border-radius: 8px;
      padding: 10px 15px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .bar {
      height: 22px;
      background-color: #42a5f5;
      margin: 4px 0;
      text-align: right;
      padding-right: 6px;
      color: #fff;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
    }
    .bar-label {
      font-size: 13px;
      margin-top: 2px;
    }
    .small {
      font-size: 13px;
      color: #555;
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <h1>學生資料查詢與統計 Student Data Query & Analytics</h1>
  <p class="small">
    請使用 Live Server 或任何本機伺服器開啟本頁，才能正確讀取 <code>db.json</code>。<br />
    Please open this page via a local web server (e.g., Live Server) so that <code>db.json</code> can be loaded correctly.
  </p>

  <!-- 篩選條件區 Filter Panel -->
  <div class="panel">
    <h2>查詢條件 Filters</h2>
    <div class="flex-row">
      <label for="idInput">學號 Student ID:</label>
      <input type="text" id="idInput" placeholder="輸入學號或留白 Enter ID or leave blank" />

      <label for="genderSelect">性別 Gender:</label>
      <select id="genderSelect">
        <option value="全部">全部 All</option>
        <option value="男">男 Male</option>
        <option value="女">女 Female</option>
      </select>

      <label for="statusSelect">報部身分 Status:</label>
      <select id="statusSelect">
        <option value="全部">全部 All</option>
        <option value="一般生">一般生 General</option>
        <option value="原住民生">原住民生 Indigenous</option>
        <option value="身心障礙生">身心障礙生 Disability</option>
        <option value="身心障礙學生適性輔導安置">身心障礙學生適性輔導安置 Disability placement</option>
      </select>

      <label for="ethnicSelect">原住民族 Ethnicity:</label>
      <select id="ethnicSelect">
        <option value="全部">全部 All</option>
        <option value="一般生">一般生 Non-indigenous</option>
        <option value="阿美族">阿美族</option>
        <option value="太魯閣族">太魯閣族</option>
        <option value="布農族">布農族</option>
        <option value="賽德克族">賽德克族</option>
        <option value="噶瑪蘭族">噶瑪蘭族</option>
        <option value="排灣族">排灣族</option>
        <option value="卑南族">卑南族</option>
        <option value="撒奇萊雅族">撒奇萊雅族</option>
        <option value="泰雅族">泰雅族</option>
        <option value="身心生">身心生</option>
      </select>

      <button id="applyFilterBtn">套用查詢 Apply Filters</button>
      <button id="resetFilterBtn" style="background-color:#757575;">重設 Reset</button>
    </div>
  </div>

  <!-- 明細表 Student List Table -->
  <div class="panel">
    <h2>學生明細 Student List</h2>
    <div class="small" id="countInfo">載入中 Loading...</div>
    <div style="max-height: 400px; overflow:auto; margin-top:8px;">
      <table id="detailTable">
        <thead>
          <tr>
